<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Enquiry Cart — Choudhry Sons Exports</title>
  <link rel="stylesheet" href="style.css?v=1" />
  <link rel="stylesheet" href="components.css?v=1" />
  <link rel="stylesheet" href="premium.css?v=7" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&display=swap" rel="stylesheet" />
</head>
<body data-page="cart">

  <!-- HEADER -->
  <!-- HEADER (injected by premium.js) -->
  <div id="cs-header"></div>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <h1 class="page-title">Enquiry Cart</h1>
    <p class="page-subtitle">Review your selected pieces and request wholesale pricing and availability details.</p>
  </div>

  <!-- CART CONTAINER -->
  <main class="cart-page-container">
    <div class="cart-layout-grid" id="cart-layout-grid">
      <!-- Left Column: Products List -->
      <div class="cart-products-column">
        <div class="cart-items-header">
          <h2>Selected Items</h2>
        </div>
        <div class="cart-page-items-list" id="cart-page-items-list">
          <!-- Injected dynamically via JS -->
        </div>
      </div>

      <!-- Right Column: Enquiry Actions -->
      <div class="cart-enquiry-column">
        <div class="cart-form-card">
          <h2>Send Enquiry</h2>
          <p class="form-desc">Send your selected items directly to our team to get wholesale pricing, availability, and export details.</p>
          
          <div class="cart-form-actions" style="margin-top: 0;">
            <button type="button" class="drawer-btn drawer-btn-whatsapp" id="cart-submit-whatsapp">
              💬 Send Enquiry via WhatsApp
            </button>
            <button type="button" class="drawer-btn drawer-btn-email" id="cart-submit-email">
              ✉️ Send Enquiry via Email
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div class="cart-empty-state" id="cart-empty-state" style="display: none;">
      <p class="empty-text">Your enquiry cart is empty.</p>
      <a href="index.html" class="empty-btn">Continue Exploring Collections</a>
    </div>
  </main>

  <!-- FOOTER -->
  <!-- FOOTER (injected by premium.js) -->
  <div id="cs-footer"></div>

  <script src="premium.js?v=9"></script>

  <script src="app.js?v=1"></script>
</body>
</html>
